seed: 42
device: cuda
run_name: attack_spatial

data:
  root: ~/data
  genimage_generator: "Stable Diffusion V1.4"
  image_size: 256
  batch_size: 16
  num_workers: 2

model:
  type: resnet2d

attack:
  type: pgd_spatial
  eps: 0.031372549  # 8/255
  alpha: 0.007843   # 2/255
  num_iter: 20
  n_samples: 1000
  checkpoint: outputs/checkpoints/resnet2d_sdv14_best.pt
