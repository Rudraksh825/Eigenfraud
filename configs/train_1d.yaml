seed: 42
device: cuda
run_name: cnn1d_sdv14

data:
  root: ~/data
  genimage_generator: "Stable Diffusion V1.4"
  image_size: 256
  batch_size: 128
  num_workers: 4

aug:
  blur_prob: 0.5
  jpeg_prob: 0.5
  jpeg_quality_range: [30, 95]
  blur_sigma_range: [0.0, 3.0]

model:
  type: cnn1d
  input_dim: 128  # image_size // 2

train:
  epochs: 30
  lr: 5.0e-4
  weight_decay: 1.0e-4
  checkpoint_dir: outputs/checkpoints
  log_wandb: false
