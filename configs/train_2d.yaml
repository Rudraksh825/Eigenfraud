seed: 42
device: cuda
run_name: resnet2d_sdv14

data:
  root: ~/data
  genimage_generator: "Stable Diffusion V1.4"
  image_size: 256
  batch_size: 64
  num_workers: 4

aug:
  blur_prob: 0.5
  jpeg_prob: 0.5
  jpeg_quality_range: [30, 95]
  blur_sigma_range: [0.0, 3.0]

model:
  type: resnet2d
  pretrained: false

train:
  epochs: 20
  lr: 1.0e-4
  weight_decay: 1.0e-4
  checkpoint_dir: outputs/checkpoints
  log_wandb: false
